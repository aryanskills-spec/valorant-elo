<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAL·ELO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    :root {
      --bg:     #0f1923;
      --card:   #1a2332;
      --card2:  #1f2d3d;
      --border: #2a3a4a;
      --red:    #ff4655;
      --red2:   #cc3643;
      --orange: #ff9c3f;
      --green:  #4caf50;
      --text:   #ece8e1;
      --dim:    #7a8fa6;
      --gold:   #ffd700;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

    /* ── LOGIN ── */
    #P-login {
      min-height: 100vh; display: flex; align-items: center;
      justify-content: center; padding: 20px;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,70,85,.12) 0%, transparent 70%);
    }
    .login-card {
      background: var(--card); border: 1px solid var(--border);
      border-top: 3px solid var(--red); border-radius: 10px;
      padding: 40px 36px; width: 100%; max-width: 380px;
    }
    .logo-big { font-size: 34px; font-weight: 900; letter-spacing: 6px; text-transform: uppercase; text-align: center; margin-bottom: 4px; }
    .logo-big span { color: var(--red); }
    .login-sub { text-align: center; color: var(--dim); font-size: 13px; margin-bottom: 32px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
    .field select, .field input {
      width: 100%; background: var(--card2); border: 1px solid var(--border);
      border-radius: 4px; padding: 10px 13px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    .field select:focus, .field input:focus { border-color: var(--red); }
    .field select option { background: var(--card2); }
    .err-msg { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 18px; }

    /* ── BUTTONS ── */
    .btn {
      padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer;
      font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase;
      transition: all .15s;
    }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--red2); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: .5; cursor: default; }
    .btn-secondary { background: transparent; color: var(--dim); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--dim); color: var(--text); }
    .btn-ghost { background: none; border: none; cursor: pointer; color: var(--dim); font-size: 19px; padding: 4px 8px; transition: color .15s; }
    .btn-ghost:hover { color: var(--text); }
    .btn-danger { background: rgba(255,70,85,.15); border: 1px solid rgba(255,70,85,.4); color: var(--red); }
    .btn-danger:hover { background: rgba(255,70,85,.25); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 11px; }

    /* ── HEADER ── */
    .header {
      background: var(--card); border-bottom: 2px solid var(--red);
      padding: 12px 20px; display: flex; align-items: center;
      justify-content: space-between; position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 22px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
    .logo span { color: var(--red); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .user-label { font-size: 13px; color: var(--dim); font-weight: 600; }

    /* ── MAIN ── */
    .main { max-width: 860px; margin: 0 auto; padding: 22px 16px; }

    /* ── BANNERS ── */
    .banner {
      border-radius: 8px; padding: 16px 20px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .banner-alert {
      background: rgba(255,70,85,.12); border: 1px solid rgba(255,70,85,.4);
      border-left: 4px solid var(--red);
      animation: pulse-border 2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%,100% { border-left-color: var(--red); }
      50%      { border-left-color: rgba(255,70,85,.35); }
    }
    .banner-ok  { background: rgba(76,175,80,.1);  border: 1px solid rgba(76,175,80,.35); border-left: 4px solid var(--green); }
    .banner-dim { background: rgba(255,255,255,.04); border: 1px solid var(--border); }
    .banner-text { font-size: 14px; font-weight: 600; }
    .banner-sub  { font-size: 12px; color: var(--dim); margin-top: 3px; }

    /* ── CARD ── */
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 22px; }
    .card-header { padding: 13px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .card-label { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--dim); }

    /* ── LEADERBOARD ── */
    .lb-row {
      display: grid; grid-template-columns: 44px 1fr 110px 80px;
      align-items: center; gap: 10px; padding: 13px 20px;
      border-bottom: 1px solid var(--border); transition: background .12s;
    }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: var(--card2); }
    .rank-num { font-size: 18px; font-weight: 900; text-align: center; }
    .rank-1 { color: #ffd700; } .rank-2 { color: #c0c0c0; } .rank-3 { color: #cd7f32; } .rank-other { color: var(--dim); }
    .player-name { font-size: 15px; font-weight: 600; }
    .player-tier { font-size: 11px; font-weight: 700; margin-top: 1px; }
    .elo-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 5px; }
    .elo-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--orange), var(--red)); transition: width .6s ease; }
    .elo-col { text-align: right; }
    .elo-num { font-size: 20px; font-weight: 800; color: var(--orange); }
    .elo-sub { font-size: 11px; color: var(--dim); margin-top: 1px; }
    .wl-col { text-align: center; font-size: 13px; }
    .wl-col .w { color: var(--green); font-weight: 700; }
    .wl-col .l { color: var(--red);   font-weight: 700; }

    /* ── ADMIN PANEL ── */
    .admin-game-info { display: flex; align-items: center; gap: 10px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
    .rater-list { padding: 10px 20px; }
    .rater-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
    .rater-done    { color: var(--green); }
    .rater-pending { color: var(--orange); }
    .admin-actions { display: flex; gap: 8px; padding: 14px 20px; border-top: 1px solid var(--border); flex-wrap: wrap; }

    /* ── HISTORY ── */
    .hist-item { padding: 13px 20px; border-bottom: 1px solid var(--border); }
    .hist-item:last-child { border-bottom: none; }
    .hist-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .hist-date { font-size: 12px; color: var(--dim); }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .badge-win  { background: rgba(76,175,80,.18); color: var(--green); border: 1px solid rgba(76,175,80,.35); }
    .badge-loss { background: rgba(255,70,85,.18);  color: var(--red);   border: 1px solid rgba(255,70,85,.35); }
    .hist-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { display: flex; align-items: center; gap: 5px; padding: 3px 9px; background: var(--card2); border-radius: 20px; font-size: 12px; }
    .chip-stars { color: var(--gold); font-size: 10px; letter-spacing: -1px; }
    .chip-pos { color: var(--green); font-weight: 700; font-size: 11px; }
    .chip-neg { color: var(--red);   font-weight: 700; font-size: 11px; }

    /* ── EMPTY STATE ── */
    .empty { text-align: center; padding: 44px 24px; color: var(--dim); }
    .empty-icon { font-size: 40px; margin-bottom: 10px; }

    /* ── MODAL ── */
    #overlay { position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .modal { background: var(--card); border: 1px solid var(--border); border-top: 3px solid var(--red); border-radius: 8px; width: 100%; max-width: 480px; max-height: 90vh; display: flex; flex-direction: column; }
    .modal-head { padding: 16px 22px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .modal-title { font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
    .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
    .modal-foot { padding: 12px 22px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
    .modal-label { font-size: 12px; color: var(--dim); margin-bottom: 14px; }

    /* ── PLAYER CHECKBOX ── */
    .pcheck { display: flex; align-items: center; gap: 12px; padding: 10px 13px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; margin-bottom: 7px; transition: all .15s; user-select: none; }
    .pcheck:hover { border-color: var(--red); }
    .pcheck.sel { border-color: var(--red); background: rgba(255,70,85,.08); }
    .check-box { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; transition: all .15s; }
    .pcheck.sel .check-box { background: var(--red); border-color: var(--red); color: #fff; }
    .pcheck-name { font-weight: 600; flex: 1; }
    .pcheck-elo  { font-size: 12px; color: var(--dim); }
    .sel-row { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 8px; }
    .sel-link { font-size: 12px; color: var(--dim); cursor: pointer; text-decoration: underline; }
    .sel-link:hover { color: var(--text); }

    /* ── OUTCOME TOGGLE ── */
    .outcome-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
    .out-btn { padding: 20px 12px; border: 2px solid var(--border); border-radius: 6px; background: transparent; color: var(--text); cursor: pointer; font-size: 15px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; transition: all .15s; }
    .out-btn.win:hover, .out-btn.win.sel { border-color: var(--green); background: rgba(76,175,80,.12); color: var(--green); }
    .out-btn.loss:hover, .out-btn.loss.sel { border-color: var(--red); background: rgba(255,70,85,.12); color: var(--red); }

    /* ── STAR RATING ── */
    .rate-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .rate-row:last-child { border-bottom: none; }
    .rate-name { flex: 1; font-weight: 600; font-size: 14px; }
    .stars { display: flex; gap: 3px; }
    .star { font-size: 26px; cursor: pointer; color: var(--border); transition: color .08s, transform .08s; line-height: 1; }
    .star.filled { color: var(--gold); }
    .star:hover  { transform: scale(1.15); }

    /* ── CHANGE PASS INPUTS ── */
    .pass-field { margin-bottom: 12px; }
    .pass-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 5px; }
    .pass-input { width: 100%; background: var(--card2); border: 1px solid var(--border); border-radius: 4px; padding: 9px 13px; color: var(--text); font-size: 14px; outline: none; transition: border-color .15s; }
    .pass-input:focus { border-color: var(--red); }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: 22px; right: 22px; background: var(--card2); border: 1px solid var(--border); border-left: 3px solid var(--green); padding: 11px 17px; border-radius: 6px; font-size: 13px; font-weight: 500; z-index: 1000; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.err  { border-left-color: var(--red); }

    /* ── SPINNER ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin .7s linear infinite; }

    @media (max-width: 560px) {
      .lb-row { grid-template-columns: 36px 1fr 90px; }
      .wl-col { display: none; }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     LOGIN PAGE
════════════════════════════════════════════ -->
<div id="P-login">
  <div class="login-card">
    <div class="logo-big">VAL<span>·</span>ELO</div>
    <p class="login-sub">Friend ELO Rankings</p>
    <div class="field">
      <label>Your Name</label>
      <select id="loginName"><option value="">Loading...</option></select>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="err-msg" id="loginErr"></div>
    <button class="btn btn-primary btn-full" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ════════════════════════════════════════════
     APP PAGE
════════════════════════════════════════════ -->
<div id="P-app" hidden>

  <div class="header">
    <div class="logo">VAL<span>·</span>ELO</div>
    <div class="header-right">
      <span class="user-label" id="headerUser"></span>
      <button id="btnNewGame" class="btn btn-primary btn-sm" onclick="openNewGame()" hidden>+ New Game</button>
      <button class="btn-ghost" onclick="openChangePass()" title="Change Password">🔑</button>
      <button id="btnResetPass" class="btn-ghost" onclick="openResetPass()" title="Reset a player's password" hidden>🛡</button>
      <button class="btn-ghost" onclick="doLogout()" title="Logout">⏻</button>
    </div>
  </div>

  <div class="main">

    <!-- Rate Now banner (participant, not yet rated) -->
    <div id="B-rate" class="banner banner-alert" hidden>
      <div>
        <div class="banner-text">🎮 New game — rate your teammates!</div>
        <div class="banner-sub" id="B-rate-sub"></div>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openRating()">Rate Now →</button>
    </div>

    <!-- Rated banner (participant, already rated) -->
    <div id="B-rated" class="banner banner-ok" hidden>
      <div>
        <div class="banner-text" style="color:var(--green)">✓ Ratings submitted</div>
        <div class="banner-sub" id="B-rated-sub">Waiting for others to rate...</div>
      </div>
    </div>

    <!-- Spectator banner (not in this game) -->
    <div id="B-spec" class="banner banner-dim" hidden>
      <div class="banner-text" style="color:var(--dim)">⏳ A game is in progress — wait for results</div>
    </div>

    <!-- Admin control panel -->
    <div id="admin-panel" class="card" hidden>
      <div class="card-header">
        <span class="card-label">Pending Game</span>
        <span id="admin-progress" style="font-size:12px;color:var(--dim)"></span>
      </div>
      <div class="admin-game-info" id="admin-game-info"></div>
      <div class="rater-list" id="admin-rater-list"></div>
      <div class="admin-actions">
        <button class="btn btn-sm btn-secondary" onclick="cancelGame()">✕ Cancel Game</button>
        <button class="btn btn-sm btn-danger"    onclick="forceFinalize()">⚡ Force Finalize</button>
      </div>
    </div>

    <!-- Leaderboard -->
    <div class="card">
      <div class="card-header">
        <span class="card-label">Leaderboard</span>
        <span id="gameCountLabel" style="font-size:12px;color:var(--dim)"></span>
      </div>
      <div id="leaderboard"></div>
    </div>

    <!-- History -->
    <div class="card">
      <div class="card-header">
        <span class="card-label">Game History</span>
      </div>
      <div id="history"></div>
    </div>

  </div>
</div>

<!-- ════════════════════════════════════════════
     MODALS
════════════════════════════════════════════ -->
<div id="overlay" hidden onclick="overlayBg(event)">

  <!-- Rating modal -->
  <div id="M-rating" class="modal" hidden>
    <div class="modal-head">
      <span class="modal-title">Rate Your Teammates</span>
      <button class="btn-ghost" onclick="closeModals()">✕</button>
    </div>
    <div class="modal-body" id="rating-body"></div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="submitRatings()">Submit Ratings</button>
    </div>
  </div>

  <!-- New game modal (admin) -->
  <div id="M-newgame" class="modal" hidden>
    <div class="modal-head">
      <span class="modal-title">New Game</span>
      <button class="btn-ghost" onclick="closeModals()">✕</button>
    </div>
    <div class="modal-body" id="newgame-body"></div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="submitNewGame()">Post Game</button>
    </div>
  </div>

  <!-- Change password modal -->
  <div id="M-changepass" class="modal" hidden>
    <div class="modal-head">
      <span class="modal-title">Change Password</span>
      <button class="btn-ghost" onclick="closeModals()">✕</button>
    </div>
    <div class="modal-body">
      <div class="pass-field"><label>Current Password</label><input class="pass-input" type="password" id="cp-cur" placeholder="Current password"></div>
      <div class="pass-field"><label>New Password</label><input class="pass-input" type="password" id="cp-new" placeholder="New password (min 3 chars)"></div>
      <div class="pass-field"><label>Confirm New Password</label><input class="pass-input" type="password" id="cp-con" placeholder="Confirm new password"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="submitChangePass()">Save Password</button>
    </div>
  </div>

  <!-- Admin reset password modal -->
  <div id="M-resetpass" class="modal" hidden>
    <div class="modal-head">
      <span class="modal-title">Reset Password</span>
      <button class="btn-ghost" onclick="closeModals()">✕</button>
    </div>
    <div class="modal-body">
      <div class="pass-field">
        <label>Player</label>
        <select class="pass-input" id="rp-player"></select>
      </div>
      <div class="pass-field"><label>New Password</label><input class="pass-input" type="password" id="rp-new" placeholder="New password"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="submitResetPass()">Reset Password</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────

let ME   = null;   // { id, name, isAdmin }
let DATA = null;   // { players, games, pendingGame }
let TOKEN = localStorage.getItem('val-elo-token');
let pollTimer = null;
let prevPendingId = null;

// New game form state
let ngParticipants = new Set();
let ngWon = null;

// Rating form state
let ratingVals = {}; // playerId → stars (1–5)

// ─────────────────────────────────────────────
// API HELPER
// ─────────────────────────────────────────────

async function api(method, path, body) {
  const res = await fetch(path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(TOKEN ? { 'Authorization': `Bearer ${TOKEN}` } : {})
    },
    body: body != null ? JSON.stringify(body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─────────────────────────────────────────────
// AUTH
// ─────────────────────────────────────────────

async function doLogin() {
  const username = document.getElementById('loginName').value;
  const password = document.getElementById('loginPass').value;
  const errEl    = document.getElementById('loginErr');
  const btn      = document.getElementById('loginBtn');
  errEl.textContent = '';

  if (!username) { errEl.textContent = 'Please select your name'; return; }
  if (!password) { errEl.textContent = 'Please enter your password'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> Signing in...';

  try {
    const res = await api('POST', '/api/login', { username, password });
    TOKEN = res.token;
    ME    = { id: res.id, name: res.name, isAdmin: res.isAdmin };
    localStorage.setItem('val-elo-token', TOKEN);
    await fetchState();
    showApp();
  } catch (e) {
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function doLogout() {
  TOKEN = null;
  ME    = null;
  DATA  = null;
  localStorage.removeItem('val-elo-token');
  stopPolling();
  document.getElementById('P-app').hidden  = true;
  document.getElementById('P-login').hidden = false;
  document.getElementById('loginPass').value = '';
}

// ─────────────────────────────────────────────
// STATE / POLLING
// ─────────────────────────────────────────────

async function fetchState() {
  try {
    const data = await api('GET', '/api/state');
    const newPendingId = data.pendingGame?.id || null;

    if (DATA) { // not first load — show notifications
      if (prevPendingId && !newPendingId)
        toast('🏆 Game finalized! ELO updated.');
      else if (!prevPendingId && newPendingId)
        toast('🎮 New game posted — rate your teammates!');
    }

    prevPendingId = newPendingId;
    DATA = data;
    renderAll();
  } catch (e) {
    if (e.message.includes('Session expired') || e.message.includes('Not logged in')) {
      await doLogout();
    }
  }
}

function startPolling() { pollTimer = setInterval(fetchState, 5000); }
function stopPolling()  { clearInterval(pollTimer); pollTimer = null; }

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

const TIERS = [
  { min: 1400, name: 'Radiant',   color: '#ffd700' },
  { min: 1300, name: 'Immortal',  color: '#ff4655' },
  { min: 1200, name: 'Ascendant', color: '#00c896' },
  { min: 1100, name: 'Diamond',   color: '#88c0d0' },
  { min: 1000, name: 'Platinum',  color: '#5e81ac' },
  { min:  900, name: 'Gold',      color: '#ff9c3f' },
  { min:  800, name: 'Silver',    color: '#c0c0c0' },
  { min:    0, name: 'Bronze',    color: '#cd7f32' },
];
function getTier(elo) { return TIERS.find(t => elo >= t.min) || TIERS[TIERS.length - 1]; }

// Safe lookup for JSONB fields (keys may be strings or numbers)
function gv(obj, id) { return obj?.[id] ?? obj?.[String(id)] ?? obj?.[Number(id)]; }

function renderAll() {
  renderBanners();
  renderAdminPanel();
  renderLeaderboard();
  renderHistory();
}

function renderBanners() {
  const pg = DATA.pendingGame;
  hide('B-rate'); hide('B-rated'); hide('B-spec');

  if (!pg) return;

  const isParticipant = pg.participants.map(Number).includes(Number(ME.id));
  const hasRated      = !!gv(pg.ratings, ME.id);

  if (!isParticipant) {
    show('B-spec');
    return;
  }

  if (!hasRated) {
    const outcome = pg.won ? '🏆 WIN' : '💀 LOSS';
    const remaining = pg.pending_raters.length;
    document.getElementById('B-rate-sub').textContent =
      `${outcome} · ${remaining} player${remaining !== 1 ? 's' : ''} still need to rate`;
    show('B-rate');
  } else {
    const left = pg.pending_raters.map(Number).filter(id => id !== Number(ME.id)).length;
    document.getElementById('B-rated-sub').textContent =
      left > 0 ? `Waiting for ${left} more player${left !== 1 ? 's' : ''} to rate...` : 'Processing...';
    show('B-rated');
  }
}

function renderAdminPanel() {
  const panel = document.getElementById('admin-panel');
  if (!ME.isAdmin || !DATA.pendingGame) { panel.hidden = true; return; }
  panel.hidden = false;

  const pg    = DATA.pendingGame;
  const total = pg.participants.length;
  const done  = total - pg.pending_raters.length;

  document.getElementById('admin-progress').textContent = `${done}/${total} rated`;

  // Game info row
  const participantNames = pg.participants.map(id => {
    const p = DATA.players.find(p => Number(p.id) === Number(id));
    return p ? p.name : `#${id}`;
  }).join(', ');

  document.getElementById('admin-game-info').innerHTML = `
    <span class="badge ${pg.won ? 'badge-win' : 'badge-loss'}" style="font-size:13px;padding:4px 14px">
      ${pg.won ? '🏆 WIN' : '💀 LOSS'}
    </span>
    <span style="font-size:13px;color:var(--dim)">${participantNames}</span>
  `;

  // Rater progress list
  document.getElementById('admin-rater-list').innerHTML = pg.participants.map(id => {
    const p       = DATA.players.find(p => Number(p.id) === Number(id));
    const name    = p ? p.name : `#${id}`;
    const hasDone = !pg.pending_raters.map(Number).includes(Number(id));
    return `
      <div class="rater-row ${hasDone ? 'rater-done' : 'rater-pending'}">
        <span>${hasDone ? '✓' : '⏳'}</span>
        <span>${esc(name)}</span>
        <span style="font-size:11px;opacity:.6">${hasDone ? 'submitted' : 'waiting...'}</span>
      </div>`;
  }).join('');
}

function renderLeaderboard() {
  const sorted  = [...DATA.players].sort((a, b) => b.elo - a.elo);
  const maxElo  = Math.max(...DATA.players.map(p => p.elo));
  const baseElo = 700;

  document.getElementById('gameCountLabel').textContent =
    `${DATA.games.length} game${DATA.games.length !== 1 ? 's' : ''} played`;

  document.getElementById('leaderboard').innerHTML = sorted.map((p, i) => {
    const rank  = i + 1;
    const t     = getTier(p.elo);
    const icon  = rank === 1 ? '👑' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    const cls   = rank <= 3 ? `rank-${rank}` : 'rank-other';
    const barW  = Math.max(6, Math.min(100, (p.elo - baseElo) / (maxElo - baseElo + 1) * 100));
    return `
      <div class="lb-row">
        <div class="rank-num ${cls}">${icon}</div>
        <div>
          <div class="player-name">${esc(p.name)}</div>
          <div class="player-tier" style="color:${t.color}">${t.name}</div>
          <div class="elo-bar-wrap"><div class="elo-bar-fill" style="width:${barW}%"></div></div>
        </div>
        <div class="elo-col">
          <div class="elo-num">${p.elo}</div>
          <div class="elo-sub">${p.games} game${p.games !== 1 ? 's' : ''}</div>
        </div>
        <div class="wl-col">
          <span class="w">${p.wins}W</span> / <span class="l">${p.losses}L</span>
        </div>
      </div>`;
  }).join('');
}

function renderHistory() {
  const el = document.getElementById('history');
  if (!DATA.games.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🎮</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">No games yet</div>
        <div style="font-size:13px">${ME.isAdmin ? 'Hit <strong>+ New Game</strong> after your next match' : 'Aryan will post a game after your next match'}</div>
      </div>`;
    return;
  }
  el.innerHTML = DATA.games.map(g => {
    const ps = g.participants.map(id => DATA.players.find(p => Number(p.id) === Number(id))).filter(Boolean);
    return `
      <div class="hist-item">
        <div class="hist-top">
          <span class="hist-date">📅 ${g.game_date || 'Unknown date'}</span>
          <span class="badge ${g.won ? 'badge-win' : 'badge-loss'}">${g.won ? 'WIN' : 'LOSS'}</span>
        </div>
        <div class="hist-chips">
          ${ps.map(p => {
            const ch  = Math.round(gv(g.elo_changes,  p.id) || 0);
            const avg = gv(g.avg_ratings, p.id);
            const stars = avg != null ? '★'.repeat(Math.round(avg)) : '';
            return `
              <div class="chip">
                <span>${esc(p.name)}</span>
                ${stars ? `<span class="chip-stars">${stars}</span>` : ''}
                <span class="${ch >= 0 ? 'chip-pos' : 'chip-neg'}">${ch >= 0 ? '+' : ''}${ch}</span>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// MODALS
// ─────────────────────────────────────────────

function showModal(id) {
  document.getElementById('overlay').hidden = false;
  ['rating','newgame','changepass','resetpass'].forEach(m =>
    document.getElementById(`M-${m}`).hidden = (m !== id)
  );
}
function closeModals() {
  document.getElementById('overlay').hidden = true;
}
function overlayBg(e) { if (e.target.id === 'overlay') closeModals(); }

// ── Rating modal
function openRating() {
  if (!DATA.pendingGame) return;
  ratingVals = {};
  const pg     = DATA.pendingGame;
  const others = pg.participants.map(Number)
    .filter(id => id !== Number(ME.id))
    .map(id => DATA.players.find(p => Number(p.id) === id))
    .filter(Boolean);

  document.getElementById('rating-body').innerHTML = `
    <div style="margin-bottom:16px">
      <span class="badge ${pg.won ? 'badge-win' : 'badge-loss'}" style="font-size:13px;padding:4px 14px">
        ${pg.won ? '🏆 VICTORY' : '💀 DEFEAT'}
      </span>
    </div>
    <div class="modal-label">Rate 1–5 stars. 1 = rough game, 5 = carried hard.</div>
    ${others.map(p => `
      <div class="rate-row">
        <span class="rate-name">${esc(p.name)}</span>
        <div class="stars" id="st-${p.id}">
          ${[1,2,3,4,5].map(n =>
            `<span class="star"
                onclick="setRating(${p.id},${n})"
                onmouseover="hoverStar(${p.id},${n})"
                onmouseout="unhoverStar(${p.id})">★</span>`
          ).join('')}
        </div>
      </div>`).join('')}
  `;
  showModal('rating');
}

function setRating(pid, n) {
  ratingVals[pid] = n;
  const c = document.getElementById(`st-${pid}`);
  if (c) c.querySelectorAll('.star').forEach((s, i) => s.classList.toggle('filled', i < n));
}
function hoverStar(pid, n) {
  const c = document.getElementById(`st-${pid}`);
  if (c) c.querySelectorAll('.star').forEach((s, i) => {
    s.style.color     = i < n ? 'var(--gold)' : '';
    s.style.transform = i < n ? 'scale(1.15)' : '';
  });
}
function unhoverStar(pid) {
  const c = document.getElementById(`st-${pid}`); if (!c) return;
  const n = ratingVals[pid] || 0;
  c.querySelectorAll('.star').forEach((s, i) => {
    s.style.color = ''; s.style.transform = '';
    s.classList.toggle('filled', i < n);
  });
}

async function submitRatings() {
  const pg     = DATA.pendingGame;
  const others = pg.participants.map(Number).filter(id => id !== Number(ME.id));
  for (const id of others) {
    if (!ratingVals[id]) { toast('Rate all players before submitting', true); return; }
  }
  try {
    const res = await api('POST', '/api/game/rate', { gameId: pg.id, ratings: ratingVals });
    closeModals();
    toast(res.finalized ? '🏆 All rated — ELO updated!' : '✓ Ratings submitted!');
    await fetchState();
  } catch (e) {
    toast(e.message, true);
  }
}

// ── New game modal (admin)
function openNewGame() {
  ngParticipants = new Set();
  ngWon = null;
  document.getElementById('newgame-body').innerHTML = `
    <div class="modal-label">Select who played this match</div>
    <div class="sel-row">
      <span class="sel-link" onclick="ngSelAll(true)">Select all</span>
      <span class="sel-link" onclick="ngSelAll(false)">Clear</span>
    </div>
    <div id="ng-players">
      ${DATA.players.map(p => `
        <div class="pcheck" id="ngp-${p.id}" onclick="ngToggle(${p.id})">
          <div class="check-box" id="ngc-${p.id}"></div>
          <span class="pcheck-name">${esc(p.name)}</span>
          <span class="pcheck-elo">${p.elo} ELO</span>
        </div>`).join('')}
    </div>
    <div style="margin-top:16px">
      <div class="modal-label">Result</div>
      <div class="outcome-grid">
        <button id="ng-win"  class="out-btn win"  onclick="ngSetWon(true)">🏆 WIN</button>
        <button id="ng-loss" class="out-btn loss" onclick="ngSetWon(false)">💀 LOSS</button>
      </div>
    </div>
    <div style="font-size:12px;color:var(--dim);margin-top:10px" id="ng-count">0 selected</div>
  `;
  showModal('newgame');
}

function ngToggle(id) {
  ngParticipants.has(id) ? ngParticipants.delete(id) : ngParticipants.add(id);
  const wrap = document.getElementById(`ngp-${id}`);
  const box  = document.getElementById(`ngc-${id}`);
  if (!wrap || !box) return;
  const sel = ngParticipants.has(id);
  wrap.classList.toggle('sel', sel);
  box.textContent = sel ? '✓' : '';
  document.getElementById('ng-count').textContent = `${ngParticipants.size} selected (min 2)`;
}
function ngSelAll(v) {
  DATA.players.forEach(p => {
    if (v) ngParticipants.add(p.id); else ngParticipants.delete(p.id);
    const wrap = document.getElementById(`ngp-${p.id}`);
    const box  = document.getElementById(`ngc-${p.id}`);
    if (wrap) wrap.classList.toggle('sel', v);
    if (box)  box.textContent = v ? '✓' : '';
  });
  document.getElementById('ng-count').textContent = `${ngParticipants.size} selected (min 2)`;
}
function ngSetWon(v) {
  ngWon = v;
  document.getElementById('ng-win').classList.toggle('sel',  v === true);
  document.getElementById('ng-loss').classList.toggle('sel', v === false);
}

async function submitNewGame() {
  if (ngParticipants.size < 2) { toast('Select at least 2 players', true); return; }
  if (ngWon === null)           { toast('Select Win or Loss', true); return; }
  try {
    await api('POST', '/api/game/create', {
      participants: [...ngParticipants].map(Number),
      won: ngWon
    });
    closeModals();
    toast('Game posted! Players can now rate.');
    await fetchState();
  } catch (e) {
    toast(e.message, true);
  }
}

// ── Admin actions
async function forceFinalize() {
  if (!confirm('Force finalize? Players who haven\'t rated will be skipped (neutral score given).')) return;
  try {
    await api('POST', '/api/game/finalize', {});
    toast('🏆 Game finalized — ELO updated!');
    await fetchState();
  } catch (e) { toast(e.message, true); }
}

async function cancelGame() {
  if (!confirm('Cancel this game? All submitted ratings will be lost and ELO won\'t change.')) return;
  try {
    await api('POST', '/api/game/cancel', {});
    toast('Game cancelled.');
    await fetchState();
  } catch (e) { toast(e.message, true); }
}

// ── Change password
function openChangePass() {
  ['cp-cur','cp-new','cp-con'].forEach(id => document.getElementById(id).value = '');
  showModal('changepass');
}

async function submitChangePass() {
  const cur = document.getElementById('cp-cur').value;
  const nw  = document.getElementById('cp-new').value;
  const con = document.getElementById('cp-con').value;
  if (!cur)        { toast('Enter your current password', true); return; }
  if (nw.length < 3) { toast('New password must be at least 3 characters', true); return; }
  if (nw !== con)  { toast('Passwords don\'t match', true); return; }
  try {
    await api('POST', '/api/password/change', { currentPassword: cur, newPassword: nw });
    closeModals();
    toast('Password updated!');
  } catch (e) { toast(e.message, true); }
}

// ── Admin reset password
function openResetPass() {
  const sel = document.getElementById('rp-player');
  sel.innerHTML = DATA.players.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
  document.getElementById('rp-new').value = '';
  showModal('resetpass');
}

async function submitResetPass() {
  const playerId = document.getElementById('rp-player').value;
  const nw       = document.getElementById('rp-new').value;
  if (nw.length < 3) { toast('Password must be at least 3 characters', true); return; }
  try {
    await api('POST', '/api/password/reset', { playerId: Number(playerId), newPassword: nw });
    closeModals();
    const name = DATA.players.find(p => Number(p.id) === Number(playerId))?.name || 'Player';
    toast(`Password reset for ${name}`);
  } catch (e) { toast(e.message, true); }
}

// ─────────────────────────────────────────────
// SHOW APP / SETUP
// ─────────────────────────────────────────────

function showApp() {
  document.getElementById('P-login').hidden = true;
  document.getElementById('P-app').hidden   = false;
  document.getElementById('headerUser').textContent = ME.name;
  document.getElementById('btnNewGame').hidden   = !ME.isAdmin;
  document.getElementById('btnResetPass').hidden = !ME.isAdmin;
  startPolling();
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────

function show(id) { document.getElementById(id).hidden = false; }
function hide(id) { document.getElementById(id).hidden = true; }

let _toastTimer;
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast${err ? ' err' : ''}`;
  clearTimeout(_toastTimer);
  requestAnimationFrame(() => el.classList.add('show'));
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

async function init() {
  // Populate login dropdown
  try {
    const players = await fetch('/api/players-list').then(r => r.json());
    const sel = document.getElementById('loginName');
    sel.innerHTML = `<option value="">Select your name...</option>` +
      players.map(p => `<option value="${p.name.toLowerCase()}">${esc(p.name)}</option>`).join('');
  } catch(e) { /* leave as-is */ }

  // Auto-login if token exists
  if (TOKEN) {
    try {
      ME = await api('GET', '/api/me');
      await fetchState();
      showApp();
      return;
    } catch (e) {
      localStorage.removeItem('val-elo-token');
      TOKEN = null;
    }
  }

  document.getElementById('P-login').hidden = false;
}

init();
</script>
